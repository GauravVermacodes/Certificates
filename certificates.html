<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Certificates | Neelastra</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
    }

    h1 {
        text-align: center;
        margin: 30px 0;
        font-size: 2.5rem;
        letter-spacing: 2px;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .card {
        background: rgba(255,255,255,0.1);
        border-radius: 15px;
        overflow: hidden;
        backdrop-filter: blur(10px);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }

    .card h3 {
        padding: 10px;
        text-align: center;
        font-size: 1rem;
    }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        z-index: 999;
        padding-top: 60px;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.9);
    }

    .modal img {
        margin: auto;
        display: block;
        max-width: 80%;
        max-height: 80%;
    }

    .close {
        position: absolute;
        top: 20px;
        right: 40px;
        font-size: 30px;
        color: white;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>📜 My Certificates</h1>

<div class="container" id="certContainer"></div>

<!-- Modal -->
<div id="modal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImg">
</div>

<script>
const certificates = [
    {
        title: "Army Internship - Computer Vision",
        img: "Army_Internship.jpeg"
    },
    {
        title: "Hackanuts Hackathon - (6th Rank)",
        img: "Ludhina_Hackthon.jpeg"
    },
    {
        title: "SIH Certificate",
        img: "SIH_CERTIFICATE.jpeg"
    },
    {
        title: "AceHack Hackathon",
        img: "AceHack.jpeg"
    }
];

const container = document.getElementById("certContainer");

certificates.forEach(cert => {
    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
        <img src="${cert.img}" alt="${cert.title}">
        <h3>${cert.title}</h3>
    `;

    card.onclick = () => openModal(cert.img);
    container.appendChild(card);
});

function openModal(imgSrc) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("modalImg").src = imgSrc;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
